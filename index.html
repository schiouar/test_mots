<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pages de mots</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --panel-soft: #f0f2f5;
      --text: #181b20;
      --muted: #6b7280;
      --line: #dfe3e8;
      --brand: #0f766e;
      --brand-dark: #0b5f59;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --danger: #b42318;
      --radius: 8px;
      --shadow: 0 16px 40px rgba(16, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(880px, calc(100vw - 28px));
      margin: 28px auto;
      display: grid;
      gap: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 24px;
      letter-spacing: 0;
    }

    h2 {
      font-size: 17px;
    }

    .muted {
      color: var(--muted);
      line-height: 1.45;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .menu {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #343941;
    }

      min-height: 38px;
